# Copilot Mail Prompter — プロンプトテンプレート設定
#
# このファイルを編集することで、Copilot に渡すプロンプトの定型文を自由に変更できます。
# 変更後はアプリを再起動してください。
#
# 【注意】proofread_body には {draft}、reply_body には {received} と {draft} が
# 必ず含まれている必要があります。アプリがこれらを入力値で置換します。

[prompts]

rule_block = '''# 厳守ルール
1. 結論・用件を先に書く。長い前置きを避ける。
2. 入力に無い事実・数値・日付を創作しない。不足箇所は本文中に【要確認】と明記する。
3. 返信作成の場合、出力はメール本文のみ。説明・前置きは不要。添削の場合はメールタイトルも生成。'''

style_internal = '# 文体: 社内向け。「お疲れ様です」始まり。過度な敬語・クッション言葉は不要。簡潔・端的に。'

style_external = '# 文体: 社外取引先向け。標準的なビジネス敬語。丁寧だが冗長にしない。'

proofread_body = '''以下のメール下書きを、文体ブロックと厳守ルールに従って添削してください。
元の意図は変えないこと。意味が不明瞭な箇所は勝手に直さず【意図確認】と注記する。

# 下書き
"""
{draft}
"""'''

reply_body = '''あなたは下記の受信メールに返信する担当者です。文体ブロックと厳守ルールに従い返信本文を作成してください。
受信メールの問いにすべて漏れなく答えること。

# 受信メール
"""
{received}
"""

# 自分が伝えたい要点（口語・順不同でOK。空なら受信メールへの妥当な返答を作る）
"""
{draft}
"""'''
